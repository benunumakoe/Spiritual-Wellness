<style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #f7f3ec 0%, #e9e0d5 100%);
      font-family: 'Inter', sans-serif;
      color: #2c2418;
      padding: 24px 16px 40px;
      min-height: 100vh;
    }

    /* app container */
    .app-container {
      max-width: 600px;
      margin: 0 auto;
      background: #fffef7;
      border-radius: 56px;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25);
      overflow: hidden;
    }

    /* header */
    .header {
      background: #fff9f0;
      padding: 28px 24px 20px;
      border-bottom: 1px solid #f0e4d4;
      text-align: center;
    }

    /* ========================================== */
    /* 🔴 PASTE THE LITURGICAL CSS RIGHT HERE 🔴 */
    /* ========================================== */
    /* Liturgical Season Banner */
    .liturgical-banner {
        background: linear-gradient(135deg, #f0e6d8 0%, #e8d9c8 100%);
        margin: 0 24px 16px;
        border-radius: 28px;
        padding: 14px 20px;
        text-align: center;
        border: 1px solid #e2cfbc;
        transition: all 0.3s ease;
    }

    .liturgical-banner .season-icon {
        font-size: 1.6rem;
        margin-right: 8px;
        vertical-align: middle;
    }

    .liturgical-banner .season-name {
        font-family: 'Cormorant Garamond', serif;
        font-size: 1.2rem;
        font-weight: 600;
        letter-spacing: 0.5px;
    }

    .liturgical-banner .season-detail {
        font-size: 0.75rem;
        color: #7a6248;
        margin-top: 6px;
        font-weight: 400;
    }

    .liturgical-banner .season-greeting {
        font-size: 0.85rem;
        font-weight: 500;
        margin-top: 8px;
        font-style: italic;
    }

    /* Season-specific color themes */
    body.season-advent .liturgical-banner { background: linear-gradient(135deg, #e8d8f0 0%, #d9c4e8 100%); border-color: #9b59b6; }
    body.season-christmas .liturgical-banner { background: linear-gradient(135deg, #fff8e7 0%, #fff0d0 100%); border-color: #f1c40f; }
    body.season-lent .liturgical-banner { background: linear-gradient(135deg, #e0d4e8 0%, #d4c4e0 100%); border-color: #8e44ad; }
    body.season-easter .liturgical-banner { background: linear-gradient(135deg, #fff5e6 0%, #ffe8d4 100%); border-color: #f39c12; }
    body.season-ordinary .liturgical-banner { background: linear-gradient(135deg, #e8f0e6 0%, #d8e4d4 100%); border-color: #27ae60; }
    /* ========================================== */
    /* 🔴 END OF LITURGICAL CSS 🔴 */
    /* ========================================== */

    /* rest of your existing CSS continues below */
    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 600;
      color: #9b6a4c;
    }
    
    /* ... the rest of your CSS ... */
</style>
