  // #1 LITURGICAL CALENDAR INTEGRATION
  function getLiturgicalInfo() {
      const today = new Date();
      const year = today.getFullYear();
      
      function getEasterDate(year) {
          const a = year % 19;
          const b = Math.floor(year / 100);
          const c = year % 100;
          const d = Math.floor(b / 4);
          const e = b % 4;
          const f = Math.floor((b + 8) / 25);
          const g = Math.floor((b - f + 1) / 3);
          const h = (19 * a + b - d - g + 15) % 30;
          const i = Math.floor(c / 4);
          const k = c % 4;
          const l = (32 + 2 * e + 2 * i - h - k) % 7;
          const m = Math.floor((a + 11 * h + 22 * l) / 451);
          const month = Math.floor((h + l - 7 * m + 114) / 31);
          const day = ((h + l - 7 * m + 114) % 31) + 1;
          return new Date(year, month - 1, day);
      }
      
      function getAdventStart(year) {
          const christmas = new Date(year, 11, 25);
          let advent = new Date(year, 10, 30);
          let sundayCount = 0;
          while (sundayCount < 4) {
              if (advent.getDay() === 0) {
                  sundayCount++;
                  if (sundayCount === 4) break;
              }
              advent.setDate(advent.getDate() - 1);
          }
          return advent;
      }
      
      const easter = getEasterDate(year);
      const adventStart = getAdventStart(year);
      const christmasStart = new Date(year, 11, 25);
      const lentStart = new Date(easter);
      lentStart.setDate(easter.getDate() - 46);
      const easterEnd = new Date(easter);
      easterEnd.setDate(easter.getDate() + 49);
      const today = new Date();
      
      let season = "ordinary";
      let seasonDisplay = "Ordinary Time";
      let icon = "🌿";
      let detail = "";
      let greeting = "";
      
      if (today >= adventStart && today < christmasStart) {
          season = "advent";
          seasonDisplay = "Advent";
          icon = "🕯️";
          const daysUntilChristmas = Math.ceil((christmasStart - today) / (1000 * 60 * 60 * 24));
          const weekNumber = Math.floor((today - adventStart) / (1000 * 60 * 60 * 24 * 7)) + 1;
          detail = `Week ${weekNumber} of Advent · ${daysUntilChristmas} days until Christmas`;
          greeting = "Prepare your heart for the coming of the Lord. Maranatha!";
      }
      else if (today >= christmasStart || (today.getMonth() === 0 && today.getDate() <= 10)) {
          season = "christmas";
          seasonDisplay = "Christmas Season";
          icon = "⭐";
          let dayOfChristmas = today >= christmasStart ? today.getDate() - 24 : today.getDate() + 7;
          detail = `Day ${dayOfChristmas} of Christmas · The Word became flesh`;
          greeting = "Christ is born! Glorify Him! Rejoice in the Light of the World.";
      }
      else if (today >= lentStart && today < easter) {
          season = "lent";
          seasonDisplay = "Lent";
          icon = "✝️";
          const daysUntilEaster = Math.ceil((easter - today) / (1000 * 60 * 60 * 24));
          const weekNumber = Math.floor((today - lentStart) / (1000 * 60 * 60 * 24 * 7)) + 1;
          detail = `Week ${weekNumber} of Lent · ${daysUntilEaster} days until Easter`;
          greeting = "Repent and believe in the Gospel. Prayer, fasting, and almsgiving.";
      }
      else if (today >= easter && today <= easterEnd) {
          season = "easter";
          seasonDisplay = "Easter Season";
          icon = "🐣";
          const dayOfEaster = Math.floor((today - easter) / (1000 * 60 * 60 * 24)) + 1;
          detail = `Day ${dayOfEaster} of Easter · The Lord is Risen!`;
          greeting = "Alleluia! He is Risen! Celebrate the victory of life over death.";
      }
      else {
          season = "ordinary";
          seasonDisplay = "Ordinary Time";
          icon = "🌿";
          let weekNumber = 1;
          if (today > easterEnd) {
              const daysAfterPentecost = Math.floor((today - easterEnd) / (1000 * 60 * 60 * 24));
              weekNumber = Math.floor(daysAfterPentecost / 7) + 1;
          } else if (today < adventStart) {
              const daysAfterChristmas = Math.floor((today - new Date(year, 0, 10)) / (1000 * 60 * 60 * 24));
              weekNumber = Math.floor(daysAfterChristmas / 7) + 1;
          }
          detail = `Week ${weekNumber} of Ordinary Time · Growing in faith daily`;
          greeting = "Walk with Christ in the rhythms of everyday life. Your ordinary moments are holy.";
      }
      
      return { season, seasonDisplay, icon, detail, greeting };
  }
  
  function applyLiturgicalInfo() {
      const info = getLiturgicalInfo();
      const seasonNameEl = document.getElementById("seasonName");
      const seasonDetailEl = document.getElementById("seasonDetail");
      const seasonGreetingEl = document.getElementById("seasonGreeting");
      
      if (seasonNameEl) seasonNameEl.innerHTML = `${info.icon} ${info.seasonDisplay}`;
      if (seasonDetailEl) seasonDetailEl.innerHTML = info.detail;
      if (seasonGreetingEl) seasonGreetingEl.innerHTML = info.greeting;
      
      document.body.classList.remove("season-advent", "season-christmas", "season-lent", "season-easter", "season-ordinary");
      document.body.classList.add(`season-${info.season}`);
  }
